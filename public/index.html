<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מנוע בינת הטבע</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&family=Frank+Ruhl+Libre:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBFAF7; --surface:#FFFFFF; --border:#E2E0D8; --ink:#2C2C2A;
    --ink-soft:#5F5E5A; --ink-faint:#A8A69E; --green:#1D9E75; --green-deep:#085041;
    --green-tint:#E1F5EE; --user-bubble:#E1F5EE; --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:'Assistant',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;}
  .ff-serif{font-family:'Frank Ruhl Libre',serif;}
  .app{max-width:760px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}
  header{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:36px;height:36px;border-radius:10px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .brand-mark svg{width:20px;height:20px;}
  .brand-text h1{font-size:18px;font-weight:600;letter-spacing:-0.01em;line-height:1.2;}
  .brand-text p{font-size:13px;color:var(--ink-soft);}
  .aud-bar{display:flex;gap:7px;flex-wrap:wrap;margin-top:1rem;}
  .aud-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--ink-soft);font-size:13.5px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;}
  .aud-btn svg{width:15px;height:15px;}
  .aud-btn.active{border:1.5px solid var(--green);background:var(--green-tint);color:var(--green-deep);}
  .chat{flex:1;padding:1.5rem;display:flex;flex-direction:column;gap:1.1rem;}
  .intro{text-align:center;color:var(--ink-soft);margin:auto 0;padding:2rem 1rem;}
  .intro .ff-serif{font-size:26px;color:var(--ink);font-weight:500;line-height:1.25;margin-bottom:.75rem;}
  .intro p{font-size:15.5px;max-width:440px;margin:0 auto;}
  .msg{display:flex;gap:10px;max-width:100%;}
  .msg.user{flex-direction:row-reverse;}
  .avatar{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .avatar.bot{background:var(--green);}
  .avatar.bot svg{width:17px;height:17px;}
  .avatar.me{background:#D9D7CE;color:var(--ink-soft);font-size:11px;font-weight:600;}
  .bubble{padding:12px 16px;border-radius:14px;font-size:15.5px;line-height:1.7;}
  .msg.bot .bubble{background:var(--surface);border:1px solid var(--border);border-top-right-radius:4px;color:var(--ink);max-width:92%;}
  .msg.user .bubble{background:var(--user-bubble);border-top-left-radius:4px;color:var(--green-deep);max-width:85%;}
  .bubble strong{font-weight:600;}
  .bubble .ln{display:block;}
  .bubble .blank{height:.5rem;}
  .typing{display:flex;gap:4px;padding:4px 2px;}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--green);opacity:.4;animation:bounce 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-4px);}}
  .composer{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:1rem 1.5rem 1.25rem;}
  .composer-inner{display:flex;gap:8px;align-items:flex-end;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px 5px 5px 14px;box-shadow:0 1px 3px rgba(0,0,0,.03);}
  textarea{flex:1;border:none;resize:none;font-family:inherit;font-size:15.5px;line-height:1.5;color:var(--ink);background:transparent;outline:none;padding:9px 0;max-height:160px;}
  .send{width:40px;height:40px;border-radius:11px;border:none;background:var(--green);color:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .send:disabled{background:#C8D6CF;cursor:default;}
  .send svg{width:18px;height:18px;}
  .composer-hint{font-size:12px;color:var(--ink-faint);text-align:center;margin-top:8px;}
  .err{background:#FCEBEB;color:#A32D2D;font-size:14px;padding:10px 14px;border-radius:10px;margin:0 1.5rem;}
  .reset-link{background:none;border:none;color:var(--ink-faint);font-size:12px;font-family:inherit;cursor:pointer;text-decoration:underline;}
  @media (max-width:480px){.chat{padding:1rem;}.composer{padding:.75rem 1rem 1rem;}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
      </div>
      <div class="brand-text">
        <h1>מנוע בינת הטבע</h1>
        <p>תאר את האתגר שלך — ונחקור אותו יחד דרך חוכמת הטבע</p>
      </div>
    </div>
    <div class="aud-bar" id="audBar"></div>
  </header>
  <div class="chat" id="chat">
    <div class="intro" id="intro">
      <div class="ff-serif">במה תרצה שנעסוק היום?</div>
      <p>בחר את התחום שלך למעלה, תאר את הסוגיה שמעסיקה אותך, ונתחיל לחקור אותה יחד — צעד אחר צעד.</p>
    </div>
  </div>
  <div id="errBox"></div>
  <div class="composer">
    <div class="composer-inner">
      <textarea id="input" rows="1" placeholder="תאר את האתגר שלך..."></textarea>
      <button class="send" id="send" disabled aria-label="שלח">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      </button>
    </div>
    <div class="composer-hint">
      <span>המנוע מלווה אותך צעד אחר צעד · בכל שלב אפשר לבקש עוד דוגמה או להמשיך</span>
      &nbsp;·&nbsp;
      <button class="reset-link" id="resetBtn">שיחה חדשה</button>
    </div>
  </div>
</div>
<script>
// הערה: הנחיות המנוע (ה-IP) והמודל אינם נמצאים כאן בכוונה.
// הם יושבים על השרת (server.js) ולעולם לא נשלחים לדפדפן.
// החזית שולחת רק את הודעות השיחה של המשתמש.

const AUD = [
  { id:"מנהל/ת", icon:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' },
  { id:"מהנדס/ת", icon:'<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76Z"/>' },
  { id:"יזם/ת", icon:'<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>' },
  { id:"אישי", icon:'<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>' },
];

let audience = "מנהל/ת";
let messages = [];
let loading = false;

const audBar = document.getElementById("audBar");
const chat = document.getElementById("chat");
const intro = document.getElementById("intro");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const errBox = document.getElementById("errBox");

function paintAud(){
  audBar.innerHTML = "";
  AUD.forEach(a=>{
    const b=document.createElement("button");
    b.className="aud-btn"+(a.id===audience?" active":"");
    b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+a.icon+'</svg> '+a.id;
    b.onclick=()=>{ if(messages.length===0){ audience=a.id; paintAud(); } };
    audBar.appendChild(b);
  });
}
paintAud();

const botAvatar='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>';

function fmt(text){
  const esc = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const lines = esc.split("\n");
  let html = "";
  for(const line of lines){
    if(line.trim()===""){ html += '<span class="blank"></span>'; continue; }
    let l = line.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
    l = l.replace(/^[-•]\s+/,"• ");
    html += '<span class="ln">'+l+'</span>';
  }
  return html;
}

function addMsg(role, text){
  if(intro) intro.style.display="none";
  const wrap=document.createElement("div");
  wrap.className="msg "+(role==="user"?"user":"bot");
  const av=document.createElement("div");
  if(role==="user"){ av.className="avatar me"; av.textContent="את/ה"; }
  else { av.className="avatar bot"; av.innerHTML=botAvatar; }
  const bub=document.createElement("div");
  bub.className="bubble";
  bub.innerHTML = fmt(text);
  wrap.appendChild(av); wrap.appendChild(bub);
  chat.appendChild(wrap);
  window.scrollTo(0,document.body.scrollHeight);
  return bub;
}

function showTyping(){
  const wrap=document.createElement("div");
  wrap.className="msg bot"; wrap.id="typing";
  wrap.innerHTML='<div class="avatar bot">'+botAvatar+'</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(wrap);
  window.scrollTo(0,document.body.scrollHeight);
}
function hideTyping(){ const t=document.getElementById("typing"); if(t) t.remove(); }

function autosize(){ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,160)+"px"; sendBtn.disabled=loading||!input.value.trim(); }
input.addEventListener("input",autosize);
input.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); submit(); } });
sendBtn.onclick=submit;

async function submit(){
  const text=input.value.trim();
  if(!text||loading) return;
  errBox.innerHTML="";
  let toSend=text;
  if(messages.length===0){ toSend="[קהל היעד: "+audience+"]\n\n"+text; }
  addMsg("user",text);
  messages.push({role:"user",content:toSend});
  input.value=""; autosize();
  loading=true; sendBtn.disabled=true;
  showTyping();
  try{
    const res=await fetch("/api/ask",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ messages:messages }),
    });
    const data=await res.json();
    hideTyping();
    if(data.error){ throw new Error(data.error.message||JSON.stringify(data.error)); }
    const reply=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim() || "(לא התקבלה תשובה)";
    addMsg("bot",reply);
    messages.push({role:"assistant",content:reply});
  }catch(e){
    hideTyping();
    errBox.innerHTML='<div class="err">החיבור למנוע נכשל. נסה שוב בעוד רגע. ('+(e.message||"")+')</div>';
  }finally{
    loading=false; autosize(); input.focus();
  }
}

document.getElementById("resetBtn").onclick=()=>{
  messages=[]; chat.innerHTML="";
  chat.appendChild(intro); intro.style.display="";
  errBox.innerHTML=""; input.value=""; autosize(); paintAud();
};
</script>
</body>
</html>
